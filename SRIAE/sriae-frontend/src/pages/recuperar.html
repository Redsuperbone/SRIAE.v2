<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRIAE - Recuperar contrasena</title>
  <link rel="stylesheet" href="../assets/css/index.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="../assets/images/icono.png" type="image/png">
</head>
<body>
<nav>
  <div class="nav-container">
    <div class="logo-box">
      <img src="../assets/images/logo.png" alt="Logo">
      <div class="logo-texto">
        <span class="siglas">SRIAE</span>
        <span class="subtitulo">Sistema de Incidentes y Alertas Escolares</span>
      </div>
    </div>
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
      <li><a href="estudiante.html"><i class="far fa-user"></i> Estudiante</a></li>
      <li><a href="incidente.html"><i class="fas fa-exclamation-triangle"></i> Incidente</a></li>
      <li><a href="protocolos.html"><i class="far fa-file-alt"></i> Protocolos</a></li>
      <li><a href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a></li>
    </ul>
    <div class="nav-actions">
      <div class="notifications-container">
        <div class="notif-icon" id="notifBtn"><i class="far fa-bell"></i><span class="badge"></span></div>
        <div class="dropdown-menu notif-dropdown" id="notifDropdown">
          <div class="notif-header">Notificaciones</div>
          <div class="notif-items"><div class="notif-item"><div class="notif-text"><p>Cargando...</p></div></div></div>
          <a href="notificaciones.html" class="view-all">Ver todas las alertas</a>
        </div>
      </div>
      <div class="user-menu-container">
        <div class="user-avatar" id="userBtn"><i class="far fa-user-circle"></i></div>
        <div class="dropdown-menu" id="userDropdown">
          <a href="login.html"><i class="fas fa-sign-in-alt"></i> Iniciar Sesion</a>
        </div>
      </div>
    </div>
  </div>
</nav>
<main class="admin-shell">
  <section class="admin-card" style="max-width:520px;margin:40px auto;">
    <h1>Recuperar contrasena</h1>
    <p class="hint" id="recoverHint">Ingresa tu correo para recibir un enlace de recuperacion.</p>
    <form id="recoverForm" class="form-grid">
      <div class="field full"><label>Correo registrado</label><input id="correo" type="email" required></div>
      <div class="field full"><button class="btn-admin btn-primary-admin" type="submit"><i class="fas fa-envelope"></i> Enviar solicitud</button></div>
    </form>
    <form id="resetForm" class="form-grid" style="display:none">
      <div class="field full"><label>Nueva contrasena</label><input id="nuevaContrasena" type="password" minlength="6" required></div>
      <div class="field full"><label>Confirmar contrasena</label><input id="confirmarContrasena" type="password" minlength="6" required></div>
      <div class="field full"><button class="btn-admin btn-primary-admin" type="submit"><i class="fas fa-key"></i> Guardar nueva contrasena</button></div>
    </form>
    <div id="recoverResult" class="notice-box" style="display:none;margin-top:16px"></div>
  </section>
</main>
<script src="scripts/menuBase.js"></script>
<script type="module" src="scripts/recuperar.js"></script>
</body>
</html>
