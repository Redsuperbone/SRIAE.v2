services:
  - type: web
    name: sriae-backend
    runtime: docker
    rootDir: SRIAE/sriae-backend
    healthCheckPath: /api/health
    disk:
      name: sriae-uploads
      mountPath: /data/uploads
      sizeGB: 1
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: sriae-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: sriae-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: sriae-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: sriae-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: sriae-db
          property: password
      - key: SRIAE_JWT_SECRET
        generateValue: true
      - key: SRIAE_UPLOAD_DIR
        value: /data/uploads
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: SRIAE_ADMIN_EMAIL
        sync: false
      - key: SRIAE_ADMIN_PASSWORD
        sync: false
      - key: SRIAE_ADMIN_NAME
        value: Administrador
      - key: SRIAE_ADMIN_LASTNAME
        value: SRIAE
      - key: SRIAE_EMAIL_ENABLED
        sync: false
      - key: SRIAE_FRONTEND_BASE_URL
        value: https://sriae-v2-4.onrender.com/src/pages
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: "true"
      - key: SMTP_STARTTLS
        value: "true"

  - type: web
    name: sriae-frontend
    runtime: static
    rootDir: SRIAE/sriae-frontend
    buildCommand: ""
    staticPublishPath: .

databases:
  - name: sriae-db
    databaseName: sriae
    user: sriae
